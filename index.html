```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Wish</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
overflow:hidden;
}

/* Login Screen */

#login{
text-align:center;
}

input{
padding:12px;
border:none;
border-radius:20px;
font-size:16px;
}

button{
margin-top:15px;
padding:12px 25px;
border:none;
background:#ff4081;
color:white;
font-size:18px;
border-radius:30px;
cursor:pointer;
}

button:hover{
background:#e91e63;
}

/* Main Content */

.container{
display:none;
padding:20px;
}

h1{
font-size:40px;
animation:zoom 2s infinite alternate;
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

.name{
color:yellow;
text-shadow:0 0 10px white,0 0 20px yellow;
}

p{
font-size:20px;
}

img{
width:260px;
max-width:90%;
border-radius:20px;
margin-top:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.4);
}

/* Balloons */

.balloon{
position:absolute;
bottom:-100px;
font-size:40px;
animation:float 8s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-110vh);}
}

/* Confetti */

.confetti{
position:absolute;
width:8px;
height:8px;
top:-10px;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(100vh) rotate(360deg);
}
}

</style>
</head>

<body>

<!-- Password Page -->

<div id="login">

<h2>🔐 Enter Password</h2>

<input type="password" id="pass" placeholder="Enter password">

<br>

<button onclick="checkPassword()">Open Birthday 🎂</button>

</div>

<!-- Birthday Page -->

<div class="container" id="main">

<h1>🎉 Happy Birthday <span class="name">Sihaa</span> 🎂</h1>

<p>Wishing you happiness, success and lots of cake today! 🎂✨</p>

<img src="baby.jpg" alt="Birthday Photo">

<br>

<button onclick="playMusic()">Play Song 🎵</button>

<audio id="song">
<source src="song.mp3" type="audio/mpeg">
</audio>

</div>

<script>

/* Password */

function checkPassword(){

let password=document.getElementById("pass").value.trim();

if(password==="run"){

document.getElementById("login").style.display="none";
document.getElementById("main").style.display="block";

createConfetti();
createBalloons();

}

else{
alert("Wrong Password ❌");
}

}

/* Music */

function playMusic(){
document.getElementById("song").play();
}

/* Confetti */

function createConfetti(){

for(let i=0;i<120;i++){

let confetti=document.createElement("div");

confetti.className="confetti";

confetti.style.left=Math.random()*100+"vw";

confetti.style.animationDuration=(Math.random()*3+2)+"s";

confetti.style.backgroundColor=
"rgb("+Math.floor(Math.random()*255)+","+
Math.floor(Math.random()*255)+","+
Math.floor(Math.random()*255)+")";

document.body.appendChild(confetti);

}

}

/* Balloons */

function createBalloons(){

let emojis=["🎈","🎈","🎈","🎈","🎈"];

for(let i=0;i<20;i++){

let balloon=document.createElement("div");

balloon.className="balloon";

balloon.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];

balloon.style.left=Math.random()*100+"vw";

balloon.style.animationDuration=(Math.random()*5+5)+"s";

document.body.appendChild(balloon);

}

}

</script>

</body>
</html>
